<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Blocked Sites</title>
    <style>
        body {
            width: 380px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background-color: #f7f5fa;
            color: #2D2D2D;
            margin: 0;
            padding: 16px;
        }
        h1 {
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 16px;
            color: #333;
        }
        .section {
            background-color: #fff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        h2 {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            color: #555;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 150px;
            overflow-y: auto;
        }
        li {
            display: flex;
            align-items: center;
            padding: 8px 0;
            font-size: 14px;
        }
        .site-label {
            flex-grow: 1;
            margin-left: 8px;
        }
        .greyed-out .site-label {
            color: #888;
        }
        .input-group {
            display: flex;
            gap: 8px;
        }
        #newSiteInput {
            flex-grow: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        #addSiteButton {
            padding: 8px 16px;
            border: none;
            background-color: #8a63d2;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s ease;
        }
        #addSiteButton:hover {
            background-color: #734bb1;
        }
    </style>
</head>
<body>
    <h1>Manage Blocked Sites</h1>

    <div class="section">
        <h2>Blocked Sites</h2>
        <ul id="blacklist">
            <!-- Blacklisted sites will be populated here -->
        </ul>
    </div>

    <div class="section">
        <h2>Open Tabs</h2>
        <ul id="openTabs">
            <!-- Open tabs will be populated here -->
        </ul>
    </div>

    <div class="section">
        <h2>Add a New Site</h2>
        <div class="input-group">
            <input type="text" id="newSiteInput" placeholder="e.g., example.com">
            <button id="addSiteButton">Block</button>
        </div>
    </div>

    <script src="manager.js"></script>
</body>
</html>
